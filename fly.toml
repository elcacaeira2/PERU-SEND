# fly.toml app configuration file generated for peru-send on 2026-06-11T01:58:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'peru-send'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 77
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
